name: Build Windows App

# Packages windows_app into a standalone PyInstaller bundle (build.bat →
# bledeck.spec). Triggers:
#   - a published GitHub release: builds and attaches the zip as a release asset
#   - manual dispatch: builds and uploads the zip as a run artifact only
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # required to upload the asset onto the release

jobs:
  build:
    name: PyInstaller bundle
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[build]"

      - name: Build
        working-directory: windows_app
        shell: cmd
        run: build.bat

      # upload-artifact zips its input itself — point it at the bundle folder,
      # not a pre-made zip, otherwise the download is a zip-inside-a-zip.
      - name: Upload run artifact
        uses: actions/upload-artifact@v5
        with:
          name: BLEDeck-windows
          path: windows_app/dist/BLEDeck/
          if-no-files-found: error

      # Release assets must be a single real file, so zip explicitly here.
      - name: Attach to release
        if: ${{ github.event_name == 'release' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = "BLEDeck-${{ github.event.release.tag_name }}-windows.zip"
          Compress-Archive -Path windows_app/dist/BLEDeck/* -DestinationPath $zip -Force
          gh release upload "${{ github.event.release.tag_name }}" "$zip" --clobber
