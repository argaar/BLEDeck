name: Build Personalized Firmware

# Builds an ESP32 firmware binary with the caller's WiFi + OTA credentials
# baked in, then emails the .bin to the requested address. Credentials are
# supplied at dispatch time, masked in the logs, written only to a gitignored
# credentials.h, and deleted at the end of the run.
on:
  workflow_dispatch:
    inputs:
      wifi_ssid:
        description: "WiFi SSID"
        required: true
      wifi_password:
        description: "WiFi Password"
        required: true
      ota_http_password:
        description: "OTA HTTP Password"
        required: true
      recipient_email:
        description: "Your email address to receive the binary"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build and email firmware
    runs-on: ubuntu-latest
    steps:
      # Read the dispatch inputs from the event payload at runtime, mask them,
      # then re-export via $GITHUB_ENV. Do NOT put them under a job/step `env:`
      # key: the runner prints each step's env block in plaintext at step
      # start, and workflow_dispatch inputs are not auto-masked like secrets —
      # on a public repo that leaks them into public logs. Reading from the
      # event file keeps the values out of both the rendered script and the
      # env dump; add-mask then scrubs them from all later output.
      - name: Mask and load credentials
        run: |
          WIFI_SSID=$(jq -r '.inputs.wifi_ssid' "$GITHUB_EVENT_PATH")
          WIFI_PASSWORD=$(jq -r '.inputs.wifi_password' "$GITHUB_EVENT_PATH")
          OTA_HTTP_PASSWORD=$(jq -r '.inputs.ota_http_password' "$GITHUB_EVENT_PATH")
          echo "::add-mask::$WIFI_SSID"
          echo "::add-mask::$WIFI_PASSWORD"
          echo "::add-mask::$OTA_HTTP_PASSWORD"
          {
            echo "WIFI_SSID=$WIFI_SSID"
            echo "WIFI_PASSWORD=$WIFI_PASSWORD"
            echo "OTA_HTTP_PASSWORD=$OTA_HTTP_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate credentials.h
        working-directory: firmware/src
        run: |
          cp credentials.h.example credentials.h
          # Escape sed replacement metacharacters (\ & |) in each value.
          esc() { printf '%s' "$1" | sed -e 's/[\\&|]/\\&/g'; }
          sed -i "s|your_wifi_ssid|$(esc "$WIFI_SSID")|"               credentials.h
          sed -i "s|your_wifi_password|$(esc "$WIFI_PASSWORD")|"       credentials.h
          sed -i "s|your_ota_http_password|$(esc "$OTA_HTTP_PASSWORD")|" credentials.h

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        working-directory: firmware
        run: pio run -e nodemcu-32

      - name: Email firmware binary
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: ${{ secrets.MAIL_USERNAME }}
          to: ${{ inputs.recipient_email }}
          subject: Firmware build ready
          body: Your personalized firmware binary is attached.
          attachments: firmware/.pio/build/nodemcu-32/firmware.bin

      # Always remove the generated credentials, even if the build or email failed.
      - name: Delete credentials.h
        if: always()
        working-directory: firmware/src
        run: rm -f credentials.h
