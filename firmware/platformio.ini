; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src

[env:nodemcu-32]
platform = espressif32@6.9.0
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions_ota.csv
; Host-only Unity tests must NOT run against the device toolchain — they ship
; their own <Arduino.h> shim that collides with the framework headers, and
; they have no setup()/loop(). Run them with `pio test -e native` instead.
test_ignore = test_protocol_parser, test_ota_rate_limit
build_unflags =
  -fno-lto
build_flags =
  #-D CORE_DEBUG_LEVEL=1
  -Os
  -ffunction-sections
  -fdata-sections
  -flto
  -Wl,--gc-sections
lib_deps =
	chris--a/Keypad@^3.1.1
	maffooclock/ESP32RotaryEncoder@^1.1.2
	thomasfredericks/Bounce2@^2.72
	https://github.com/ThingPulse/esp8266-oled-ssd1306#4.6.1
	makuna/NeoPixelBus@^2.8.4
	#adafruit/Adafruit NeoPixel@^1.15.2
	rlogiacco/CircularBuffer@^1.4.0
	ayushsharma82/ElegantOTA@=3.1.7

; Verbose serial logging build: pio run -e debug
; Prints all RX/TX packets, button presses, RGB updates, etc. Default
; production build keeps non-error prints silent.
[env:debug]
extends = env:nodemcu-32
build_flags =
  ${env:nodemcu-32.build_flags}
  -DDEBUG_SERIAL=1

; Battery-divider calibration build: pio run -e calibrate
; Prints a guided multimeter-vs-ADC calibration line every 5 s so the
; BAT_CALIBRATION constant in configuration.h can be tuned per board.
; See firmware/README.md "Battery calibration" for the worked example.
[env:calibrate]
extends = env:nodemcu-32
build_flags =
  ${env:nodemcu-32.build_flags}
  -DCALIBRATE_BATTERY=1

; Native unit tests — run on host PC with Unity. No ESP32 needed.
; Invocation: pio test -e native
; The test files include only the bits of src/ they need (protocolparser.h,
; OtaRateLimiter struct in ota_manager.h). Other source files reference
; Arduino / WiFi / BLE libraries that do not exist on the host, so we keep
; the env scoped to test/ only via test_build_src = no (the default).
; The protocol parser pulls <Arduino.h>; a host-side shim header in
; test/test_protocol_parser/Arduino.h provides the required typedefs.
[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -std=gnu++17
  -DUNIT_TEST
  -I test/test_protocol_parser